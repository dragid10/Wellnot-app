name: symptom_tracker_app
description: "Symptom tracker app"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
version: 1.12.0+39

environment:
  sdk: '>=3.0.0 <4.0.0'

# Build SQLite3MultipleCiphers instead of vanilla SQLite for encryption support.
# See: https://github.com/simolus3/sqlite3.dart/blob/main/sqlite3/doc/hook.md
hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc

# Dependencies specify other packages that your package needs in order to work.
dependencies:
  flutter:
    sdk: flutter

  # iOS-style icons (used with CupertinoIcons class)
  cupertino_icons: ^1.0.8

  # Calendar view widget for browsing entries by date
  table_calendar: ^3.2.0

  # Type-safe SQLite ORM with code generation for local storage
  drift: ^2.32.0
  # Pre-compiled SQLite binaries bundled via Dart build hooks (replaces sqlite3_flutter_libs)
  sqlite3: ^3.2.0
  # File system path resolution for locating the database file
  path_provider: ^2.1.5
  path: ^1.9.0

  # Local push notifications for daily reminders
  flutter_local_notifications: ^21.0.0

  # Device biometrics / PIN authentication for app lock
  local_auth: ^3.0.1

  # Date formatting (e.g., "Jan 15, 2026")
  intl: ^0.20.2

  # Android intent support for opening system alarm settings
  android_intent_plus: ^6.0.0

  # Dependency injection — provides AppDatabase to widget tree
  provider: ^6.1.2

  # Key-value storage for notification settings (enabled, hour, minute)
  shared_preferences: ^2.5.4

  # Timezone support for scheduling notifications at a specific local time
  timezone: ^0.11.0

  # Detects the device's local timezone name for accurate notification scheduling
  flutter_timezone: ^5.0.1

  # Accelerometer access for shake gesture detection
  sensors_plus: ^7.0.0

  # Package info for including app version in feedback emails
  package_info_plus: ^8.3.0

  # Opens mailto: links to send feedback via the user's email client
  url_launcher: ^6.3.1

  # Required for integration tests
  integration_test:
    sdk: flutter
  archive: ^4.0.9
  home_widget: ^0.9.0

  # File picker for importing backup data from device storage
  file_picker: ^10.3.10

  # Secure storage for database encryption key (Android Keystore / iOS Keychain)
  flutter_secure_storage: ^9.2.4
  showcaseview: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Recommended lint rules for Flutter projects
  flutter_lints: ^6.0.0

  # Drift code generation (keep in sync with drift version above)
  drift_dev: ^2.32.0
  build_runner: ^2.13.1

  # Mocking framework for tests
  mocktail: ^1.0.4

  yaml: ^3.1.3


# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/images/
